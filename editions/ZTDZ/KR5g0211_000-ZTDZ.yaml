front:
  text: 上清黄庭五蔵六府眞人玉軸經典七太上大道元極元始天尊謂黄帝曰子求治人之要而不知治身之術者哉營他而不營己修外而不修内豈不哀哉黄帝稽首再拜長跪而對曰幸哉幸哉敢以不肖之軀伏待玄㫖願垂哀救翹仰聖音天尊曰人之生也建八尺之質合萬有之軀外有四支九竅内有五蔵六府各有神主精禀金火氣諧水木五蔵者五神之府含生之器神欲安氣欲寬導養之妙火則躁而禮金則勇而義躁與勇陰義與禮陽陰陽之數也長陰則殺長陽則生生殺之數也故抑躁行禮義則生長勇罷禮義則死外行禮義内安脾膽導養之秘也以忠孝爲先不識其源傷生之道然知其本靈秘之術若能安其神煉其形攝生得氣歸正背僞出其恍惚入其玄妙辨補瀉之理誕延育之方可昇仙矣子宜龜鏡焉道在其中也黄帝敬授靈訣專精行之未逾一紀而神猷先鑒行腎氣使心精步逾玄含靈契履入水不溺入火不焚氣運於内神應於外豈非至眞哉黄帝行是秘法補六府陶煉五精吐故納新眞氣即徹後托鑄鼎驪山昇仙去矣
  hash: sha256:654f025bd24a64a6a4604fa13134c6bc5457183dfbf208172099f1ade8de0fd9

body:
  text: 五蔵六府圖文肺蔵圖治肺當用呬呬爲瀉吸爲補夫肺者兌之氣金之精其色白其象如懸磬其神如白獸肺生𩲸化爲玉童長七寸持杖徃來於肺蔵其神多怒者蓋發於肺蔵也欲安其𩲸而存其形者則當收思斂欲含仁育義不怒其怒不聲其聲息其生則合乎太和肺合於大腸上主於鼻故人之肺有風則鼻塞也色枯者肺乾也人鼻痒者肺有蟲也人之多怖者𩲸離於肺也人之體白點者肺㣲也人之多聲者肺强也人之不耐寒者肺勞也人好食辛者肺不足也人顔色鮮白者肺无惡也人大腸鳴者肺氣壅也夫肺主商肺有疾當用呬呬肺之氣也其氣義則瘳疾乆以安神人有怨怒填塞𦙄臆者則呬而洩之蓋自然之理也向若不呬必致傷敗獲呬而獲生乎故病用呬矣夫人無苦用呬者不祥也夫肺處七宫驚門主信使人方正平直習武先忠則魂安形全也且肺者秋之用事秋三月天地氣明肅殺萬物雀卧鷄起用安至精公施抑怒改息兩相形長秋之道也逆之則傷肺常以七月八月九月望旭旦西面平坐鳴天鼓七飲玉漿三然瞑目吸兌宫白氣入口吞之以補呬之損以正白用以致玉童餞則神安思强氣全體平百邪不能殃之兵刄不能害之延年益壽名飛仙耳蓋所謂補瀉神氣安息靈魂之所致哉心蔵圖治心當用呵呵爲瀉吸爲補夫心者離之氣火之精其色赤其象如蓮華其神如朱鳥心生神化爲玉女身長八寸持玉英出入於心府也其神躁而無準人之暴急者蓋發於心蔵也欲安其神而全其形者則全忠履孝輔義安仁止其風靜其急息其熾澄其神而全其形則合中和也心合乎小腸主其血脉上主於舌人之血壅者心驚也舌不知味者心虧也上智者心有七孔中智五孔下智三孔眀達者心有二孔尋常者有一孔愚癡者無孔也多忘者心神離也好食苦者心不足也多悲者心傷也重應者心亂也面青黑者心氷也容色赤者心無他惡也夫心主徵心有疾當用呵呵者心氣也理其氣體呵能靜其心而和其神所以人之心亂者則多呵蓋天全之候也人皆爲而不知哉向若不呵當致憤怒者也故心疾用呵除邪氣也夫心處九宫驚門主禮使人樂善好施恭孝以修仁則心和而形全也且夫心者夏之用事也天地氣交萬物華結亥寢丑起無厭於養英成實長夏之德也逆之則傷心常以四月五月六月弦朔清旦南面端坐叩金梁九漱玄泉三靜思想吸離宫之赤氣入口三吞之以補呵之損植其靈府開心宂餌火離濯玉女神平體安衆殃不害金火不能傷治神之靈也肝蔵圖治肝當用噓噓爲瀉吸爲補夫肝者震之氣木之精其色青其象如懸瓠肝生魂其神如龍化爲二玉女玉童一青衣一黄衣各長一寸一負龍一持玉漿出入於肝蔵也其神好仁人之行惠者蓋發於肝也欲安其魂而延其齡者則當澤被芻棘恩覃庶類而後全其生則合乎太清者也肝合於膽上主於目肝盛則目赤又主於筋肝虧則筋急皮枯者肝熱也肌肉黑黯者肝風也好食醋味者肝不足也色青者肝盛也手足汗者肝無他惡也毛發枯者肝傷也夫肝主月故肝有疾者當用噓噓者肝之氣也其氣仁也故除毁痛人之有傷痛者則噓之以止痛皆自然之驗也不以爲靈哉此之至理也通玄之道且肝之主春春之用事春三月天地氣生萬物花葉繁茂人及芻萌順陽之道也逆之傷肝也傷之則毛骨不榮也常以正月二月三月寅時東向平坐叩齒三通閉氣七息吸震宫之青氣三吞之以補噓之損以享青之祝以致二童之饌木精乘王則肝歡寡憂精之妙也脾蔵圖治脾當用呼呼爲瀉吸爲補夫脾者坤之氣土之精其色黄其狀如覆盆脾主意其神如鳳化爲玉女長六寸循環於脾蔵也其神多疾妒人之疾妒蓋起於脾蔵也土無正形故妒之無準也婦人則妒劇者乘陰氣也欲安其神則當去欲寡色少思屏慮長其土德而後全其生也則合乎太陰脾連上主於口消穀之府也如磨之轉化生而入熟也食不消者脾不轉也食堅硬之物磨之不化也人不欲食訖便卧其脾則側不轉食堅物生食不化則爲宿食之患也故蔵不調則傷脾脾蔵不調則傷質質神俱損則傷人之速故人之不欲食生硬堅澁之物全人之道也人不欲食爲脾中有不化食也多惑者脾識不安也多食者脾虛也食不下者脾塞也無顔色者脾傷也好食甘者脾不足也顔色鮮滑者脾無他惡也夫脾主於中宫土也故脾之有疾當用呼呼者能引脾疾故人之中熱則呼之以驅熱温之弊也向若不呼則熱氣壅於内陰息於外致憤悶之患形何而安哉夫脾者位寄於二宫主義也使人寬舒廣大屈已濟人以利不爭者也且脾之無定寄王四季隨六氣助成萬物脾育腸胃義之道也不以自專爲德不以物競爲功長坤之理逆之則傷脾常以四季月末十八日旭旦正坐中宫禁氣五息鳴天鼓七吸土宫之黄氣入口五吞之補呼之損飲玉醴以致神之和以補於脾以佐神氣則入山不畏虎狼登險不懼顛蹶者行氣之精也腎蔵圖治腎當用吹吹爲瀉吸爲補夫腎者陰之精坎之氣其色黑其象如圓石其神如白鹿兩頭化爲玉童長一尺出入於腎蔵其神和也人之柔順者蓋發於腎蔵也欲安其神則當仁德平廣膏潤萬物長其精順其志而後全其生形則合乎太清者也腎合於骨上主於齒痛者腎傷也又主於耳夫人骨痛者腎虛也耳不聞者腎虧也齒多楚者腎虛也齒黑齡者腎風也耳痛者腎氣壅也腰不伸者腎氷也色黄者腎衰也容色紫光者腎無他惡也骨鳴者腎嬴也夫腎主羽人之有疾當用吹吹者腎之氣能抽腎之疾故人之積氣衝臆者則强吹也腎氣沉滯吹徹則通且腎者冬之用事冬三月乾坤氣閉萬物伏蔵戍寢寅起與玄陰並外陰内陽以養骨齒以治其神逆之則傷腎常以十月十一月十二月面北平坐鳴金梁七飲玉泉三吸玄宫之黑氣入口久吞之以補吹之損以符呦鹿之詞以致玉童之饌益腎氣神和體安則群妖莫害則致長生之道矣膽蔵圖以前名五蔵加膽名六府膽亦受水氣與坎同道膽有疾當用嘻嘻爲瀉吸爲補圖形已附在肝蔵夫膽者金之精水之氣其色青其象如懸瓠其神如龜蛇化爲玉童長一尺戟其手奔馳於膽蔵其神勇人之勇决者蓋發於膽蔵也欲安其神當息忿寢爭與仁輔義其後全生也膽合於膀胱上主於毛髮毛髮枯者膽損也髮燥者膽有風也無懼者膽洪大也顔貌青光者膽無他惡也爪甲乾者膽虧也毛焦者膽熱也無事泪出者膽勞也好酸者膽不足也夫膽寄於坎宫使人觀智慕善屏邪去佞絶奸治方直也且膽者生於金金生於武故多勇且抑之大吉夫膽乘陰之氣秉金之精故主於殺殺則悲故人之悲者金生於水目中墮淚夫心主火膽主水火主辛水主苦所以人有弊者即言辛苦故爲水火二氣相背則火得水而煎陰陽交爭水勝於火故目淚出淚類也苦而出故名曰淚夫悲啼號泣其稱聲苦者爲淚出於膽而以苦爲詞也膽水也而主於陰目明也而主於陽陰從陽故從目出常以孟月端居正思北吸玄宫之黑氣入口九吞之以補嘻之損以食龜蛇之味飲玉童之漿然後神治體和顛不能犯邪莫之向膽氣所致也夫庸愚之人不信玄妙謗訕眞理深可悲哉自取傷毁儻有一夫而稍有膽氣而亦遇妖恠非常之靈則怒目切齒神强膽正者必伏𡨋神也豈非神氣所用哉何不信之凡叩齒爲寫抽一云閉氣漱泉爲補益六府之精此亦爲寫也非𡨋呼吸獨稱寫耳黄帝跪受不勝涕淚叩頭頓首啓太上大道天始天尊曰敬奉玄妙之㫖豈期肉人遭遇先會起窮骨於億載刻肌粉骨無酬聖造蔵之中矣天地長久不敢忘也天尊曰子有仙骨授此玄要欲答吾恩勿妄傳無識也黄帝敬受尊㫖不敢違授岐伯曰夫人之受天地之氣生氣之來也謂之精精之媾也謂之靈靈之變也謂之神神之化也謂之魂隨魂徃來謂之識並精出入謂之𩲸管生精𩲸謂之心心有所從謂之情情有所屬謂之意意有所指謂之志志有所慮謂之思思而逺慕謂之慮慮而用事謂之智智者此諸見者蓋精神魂𩲸意志思慮情智見識之所用也抱朴子曰一人之貌含天地之象其在身矣則脅爲宫室四支爲郊境頭圓象天足方象地左目爲日右目爲月髮爲星辰齒爲金玉大腸爲江河小腸爲川瀆兩乳臍膝爲五嶽肝膽脾肺心爲五行故修道者常理之若不修緝必致毁敗榮衛不通血氣不流齒髮不堅五蔵不調則傾化隨及故至人修其毁治其無疾黄帝曰人之五蔵各有神府各修道治錬氣存神去邪歸吾正道可見也元始天尊太玄眞經曰喜怒損性哀樂傷神性損害生神傷侵命氣全體平神安形逸此全生訣也上清黄庭五蔵六府眞人玉軸經
